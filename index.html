<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML London Trip</title>
  </head>
  <body>
    <header>
      <h1>Il mio Viaggio a Londra</h1>
    </header>

    <main>
      <section>
        <img src="img/pexels-bill-emrich-230794-0.jpg" alt="Londra 0" />
        <img src="img/pexels-bill-emrich-230794-1.jpg" alt="Londra 1" />
        <img src="img/pexels-bill-emrich-230794-2.jpg" alt="Londra 2" />
      </section>

      <hr />

      <section>
        <h2>Le mie spese</h2>

        <table>
          <thead>
            <tr>
              <th>Numero</th>
              <th>Descrizione</th>
              <th>Costo</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>1</td>
              <td>Biglietto aereo</td>
              <td>€ 150</td>
            </tr>
            <tr>
              <td>2</td>
              <td>Hotel</td>
              <td>€ 250</td>
            </tr>
            <tr>
              <td>3</td>
              <td>Metro</td>
              <td>€ 50</td>
            </tr>
          </tbody>
          <tfoot>
            <tr>
              <td colspan="2">Totale</td>
              <td>€ 450</td>
            </tr>
          </tfoot>
        </table>
      </section>

      <hr />
    </main>
  </body>
</html>
